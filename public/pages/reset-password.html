<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose New Password | HabitTrack</title>
    <script src="../scripts/local-dev-redirect.js"></script>
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
    <a class="brand-mark" href="./index.html" aria-label="HabitTrack home">
        <img class="brand-mark__icon" src="../images/logos/logo.png" alt="">
    </a>
    <main class="auth-shell">
        <section class="auth-card">
            <h1>Choose a New Password</h1>
            <p class="auth-copy">Use the reset token from your local reset link to set a new password.</p>

            <form id="resetPasswordForm" class="auth-form">
                <label class="auth-label" for="token">Reset token</label>
                <input id="token" name="token" type="text" autocomplete="off" required>

                <label class="auth-label" for="password">New password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
                <div id="passwordMeter" class="password-meter" data-strength="empty" aria-live="polite">
                    <div class="password-meter__bar-track">
                        <div class="password-meter__bar" data-password-meter-bar></div>
                    </div>
                    <p class="password-meter__summary">Strength: <strong id="passwordStrengthLabel">No password yet</strong></p>
                    <p id="passwordDescription" class="auth-hint">Choose a password with at least 8 characters, including a letter and a number.</p>
                    <ul id="passwordRequirements" class="password-checklist"></ul>
                </div>

                <label class="auth-label" for="confirmPassword">Confirm new password</label>
                <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>
                <p id="passwordMatchHint" class="auth-hint auth-hint--match"></p>

                <button class="btn btn-primary" type="submit">Reset password</button>
            </form>

            <p id="feedback" class="auth-feedback" role="status" aria-live="polite"></p>
            <p class="auth-switch"><a href="./login.html">Back to login</a></p>
        </section>
    </main>

    <script src="../scripts/auth-ui.js"></script>
    <script src="../scripts/reset-password.js"></script>
</body>
</html>
