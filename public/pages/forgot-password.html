<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | HabitTrack</title>
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
    <a class="brand-mark" href="./index.html" aria-label="HabitTrack home">
        <img class="brand-mark__icon" src="../images/logos/logo.png" alt="">
    </a>
    <main class="auth-shell">
        <section class="auth-card">
            <h1>Reset your password</h1>
            <p class="auth-copy">Enter your email and this app will create a reset link for local testing.</p>

            <form id="forgotPasswordForm" class="auth-form">
                <label class="auth-label" for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>
                <button class="btn btn-primary" type="submit">Create reset link</button>
            </form>

            <p id="feedback" class="auth-feedback" role="status" aria-live="polite"></p>
            <div id="resetLinkContainer" class="reset-link-container hidden"></div>
            <p class="auth-switch"><a href="./login.html">Back to login</a></p>
        </section>
    </main>

    <script src="../scripts/forgot-password.js"></script>
</body>
</html>
