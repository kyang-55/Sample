<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HabitTrack</title>
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
    <a class="brand-mark" href="./index.html" aria-label="HabitTrack home">
        <img class="brand-mark__icon" src="../images/logos/logo.png" alt="">
    </a>
    <main class="auth-shell">
        <section class="auth-card">
            <h1>Welcome back</h1>
            <p class="auth-copy">Sign in to manage your habits, streaks, and daily check-ins. After your password is confirmed, we'll email a 6-digit verification code.</p>

            <form id="loginForm" class="auth-form">
                <label class="auth-label" for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>

                <label class="auth-label" for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <label class="auth-checkbox" for="rememberMe">
                    <input id="rememberMe" name="rememberMe" type="checkbox">
                    <span>Remember me for 30 days</span>
                </label>

                <button id="loginButton" class="btn btn-primary" type="submit">Continue</button>
            </form>

            <p id="feedback" class="auth-feedback" role="status" aria-live="polite"></p>
            <p class="auth-switch"><a href="./forgot-password.html">Forgot your password?</a></p>
            <p class="auth-switch">Need an account? <a href="./registration.html">Create one</a></p>
        </section>
    </main>

    <script src="../scripts/auth-ui.js"></script>
    <script src="../scripts/login.js"></script>
</body>
</html>
